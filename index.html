<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Gasto Gasolina</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛽</text></svg>">
  <style>
    :root {
      --bg:          #0d1117;
      --card:        #161b2e;
      --card-hover:  #1c2240;
      --border:      rgba(255,255,255,0.07);
      --accent:      #06d6c7;
      --accent-glow: rgba(6,214,199,0.18);
      --text:        #e6edf3;
      --text-muted:  #7d8590;
      --pos:         #3fb950;
      --neg:         #f85149;
      --orange:      #f0a500;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, Segoe UI, Roboto, Arial;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 16px;
    }
    .container { max-width: 560px; margin: 0 auto; }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 22px;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.3px;
    }

    /* Balance card */
    .balance-card {
      background: var(--card);
      border-radius: 16px;
      padding: 28px 24px;
      text-align: center;
      border: 1px solid var(--border);
      border-top: 3px solid var(--accent);
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
      margin-bottom: 14px;
    }
    .balance-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--accent);
      margin-bottom: 10px;
    }
    .balance-amount {
      font-size: 52px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 12px;
    }
    .balance-amount.pos   { color: var(--pos); }
    .balance-amount.neg   { color: var(--neg); }
    .balance-amount.empty { color: var(--text-muted); }
    .balance-stats {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.7;
    }
    .balance-stats strong { color: var(--text); }
    .balance-week-info {
      display: inline-block;
      margin-top: 10px;
      font-size: 11px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 12px;
      color: var(--text-muted);
    }

    /* Add button */
    .btn-add {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 15px;
      background: var(--accent);
      color: #0d1117;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 14px;
      box-shadow: 0 4px 16px var(--accent-glow);
      transition: filter 0.15s, box-shadow 0.15s;
    }
    .btn-add:hover { filter: brightness(1.1); box-shadow: 0 4px 24px rgba(6,214,199,0.35); }
    .btn-add svg { flex-shrink: 0; }

    /* Table card */
    .table-card {
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
      margin-bottom: 14px;
    }
    .table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
    }
    .table-header h2 {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .entry-count {
      font-size: 11px;
      color: var(--text-muted);
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      padding: 2px 10px;
    }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: 8px 16px;
      font-size: 10px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      text-align: left;
      background: rgba(0,0,0,0.2);
      border-bottom: 1px solid var(--border);
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--card-hover); }
    tbody td { padding: 11px 16px; font-size: 14px; color: var(--text); vertical-align: top; }
    td.week-cell { font-size: 11px; color: var(--text-muted); }
    td.amount-cell { font-weight: 600; color: var(--orange); }
    td.saldo-cell { font-weight: 700; }
    td.saldo-cell.pos { color: var(--pos); }
    td.saldo-cell.neg { color: var(--neg); }
    td.action-cell { text-align: right; }
    .btn-delete {
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(255,255,255,0.15);
      padding: 2px 4px;
      border-radius: 4px;
      font-size: 14px;
      line-height: 1;
      transition: color 0.15s;
    }
    .btn-delete:hover { color: var(--neg); }
    .empty-state {
      text-align: center;
      padding: 48px 16px;
      color: var(--text-muted);
      font-size: 15px;
    }
    .empty-icon { font-size: 36px; margin-bottom: 10px; }

    /* Settings */
    .settings-toggle {
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      text-align: center;
      padding: 8px;
      user-select: none;
      transition: color 0.15s;
      letter-spacing: 0.3px;
    }
    .settings-toggle:hover { color: var(--accent); }
    .settings-card {
      display: none;
      background: var(--card);
      border-radius: 16px;
      padding: 18px;
      border: 1px solid var(--border);
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
      margin-top: 8px;
    }
    .settings-card.open { display: block; }
    .settings-card h3 {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }
    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .field input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      color: var(--text);
      background: rgba(0,0,0,0.3);
    }
    .field input:focus {
      outline: none;
      border-color: var(--accent);
      background: rgba(6,214,199,0.05);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .settings-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-sm {
      padding: 8px 14px;
      border-radius: 8px;
      border: none;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: filter 0.15s;
      letter-spacing: 0.3px;
    }
    .btn-sm:hover { filter: brightness(1.15); }
    .btn-sm.blue { background: var(--accent); color: #0d1117; }
    .btn-sm.grey { background: rgba(255,255,255,0.08); color: var(--text-muted); border: 1px solid var(--border); }
    .btn-sm.red  { background: rgba(248,81,73,0.15); color: var(--neg); border: 1px solid rgba(248,81,73,0.3); }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--card);
      border-radius: 20px 20px 0 0;
      padding: 28px 24px 32px;
      width: 100%;
      max-width: 560px;
      border: 1px solid var(--border);
      border-bottom: none;
      animation: slideUp 0.22s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .modal-handle {
      width: 40px; height: 4px;
      background: rgba(255,255,255,0.12);
      border-radius: 2px;
      margin: 0 auto 20px;
    }
    .modal h2 { font-size: 20px; font-weight: 700; margin-bottom: 22px; color: var(--text); }
    .modal .field input { font-size: 16px; padding: 13px 14px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 8px; }
    .btn-cancel {
      flex: 1;
      padding: 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-cancel:hover { background: rgba(255,255,255,0.1); }
    .btn-save {
      flex: 2;
      padding: 14px;
      background: var(--accent);
      color: #0d1117;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 16px var(--accent-glow);
      transition: filter 0.15s;
    }
    .btn-save:hover { filter: brightness(1.1); }

    /* Season end button */
    .btn-season-end {
      padding: 5px 11px;
      background: rgba(240,165,0,0.1);
      color: var(--orange);
      border: 1px solid rgba(240,165,0,0.3);
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .btn-season-end:hover { background: rgba(240,165,0,0.2); }

    /* Past seasons */
    .seasons-toggle {
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      text-align: center;
      padding: 8px;
      user-select: none;
      transition: color 0.15s;
      letter-spacing: 0.3px;
      margin-top: 4px;
    }
    .seasons-toggle:hover { color: var(--orange); }
    .seasons-section {
      display: none;
      margin-top: 8px;
      margin-bottom: 20px;
    }
    .seasons-section.open { display: block; }
    .season-card {
      background: var(--card);
      border-radius: 14px;
      border: 1px solid var(--border);
      border-left: 3px solid var(--orange);
      padding: 16px 18px;
      margin-bottom: 10px;
    }
    .season-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .season-name { font-size: 15px; font-weight: 700; color: var(--orange); }
    .season-period { font-size: 11px; color: var(--text-muted); }
    .season-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .season-stat {
      background: rgba(0,0,0,0.2);
      border-radius: 8px;
      padding: 8px 12px;
    }
    .season-stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
    .season-stat-value { font-size: 15px; font-weight: 700; color: var(--text); }
    .season-stat-value.pos { color: var(--pos); }
    .season-stat-value.neg { color: var(--neg); }

    /* Season end modal summary */
    .season-summary {
      background: rgba(0,0,0,0.25);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
    }
    .season-summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
    }
    .season-summary-row:last-child { border-bottom: none; }
    .season-summary-row span:first-child { color: var(--text-muted); }
    .season-summary-row span:last-child  { font-weight: 600; color: var(--text); }
    .season-summary-row span:last-child.pos { color: var(--pos); }
    .season-summary-row span:last-child.neg { color: var(--neg); }
    .btn-end-confirm {
      flex: 2;
      padding: 14px;
      background: var(--orange);
      color: #0d1117;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: filter 0.15s;
    }
    .btn-end-confirm:hover { filter: brightness(1.1); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

    /* Date input dark fix */
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.6); cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <h1>Gasto Gasolina</h1>
      <button class="btn-season-end" id="btnSeasonEnd">🏁 Encerrar temporada</button>
    </div>

    <div class="balance-card">
      <div class="balance-label">Disponível agora</div>
      <div class="balance-amount empty" id="balanceAmount">—</div>
      <div class="balance-stats" id="balanceStats">Adicione o primeiro abastecimento</div>
      <div id="balanceWeekInfo"></div>
    </div>

    <button class="btn-add" id="btnAdd">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Adicionar abastecimento
    </button>

    <div class="table-card">
      <div class="table-header">
        <h2>Histórico</h2>
        <span class="entry-count" id="entryCount"></span>
      </div>
      <div id="tableContent">
        <div class="empty-state">
          <div class="empty-icon">⛽</div>
          Nenhum abastecimento registado ainda
        </div>
      </div>
    </div>

    <div class="seasons-toggle" id="seasonsToggle">🏆 Temporadas anteriores</div>
    <div class="seasons-section" id="seasonsSection"></div>

    <div class="settings-toggle" id="settingsToggle">⚙ Configurações</div>
    <div class="settings-card" id="settingsCard">
      <h3>Configurações</h3>
      <div class="field">
        <label>Orçamento semanal (€)</label>
        <input type="number" id="cfgBudget" step="0.01" min="0" placeholder="75.00">
      </div>
      <div class="field">
        <label>Data de início (para acumulação do orçamento)</label>
        <input type="date" id="cfgStartDate">
      </div>
      <div class="field">
        <label>Apps Script URL (opcional)</label>
        <input type="text" id="cfgAsUrl" placeholder="https://script.google.com/macros/s/.../exec">
      </div>
      <div class="field">
        <label>API Token (opcional)</label>
        <input type="text" id="cfgApiToken" placeholder="chave_secreta">
      </div>
      <div class="settings-actions">
        <button class="btn-sm blue" id="btnSaveSettings">Guardar</button>
        <button class="btn-sm grey" id="btnExport">Exportar JSON</button>
        <button class="btn-sm grey" id="btnImport">Importar JSON</button>
        <button class="btn-sm red" id="btnClearAll">Limpar tudo</button>
      </div>
    </div>
  </div>

  <!-- Season end modal -->
  <div class="modal-overlay" id="seasonOverlay">
    <div class="modal">
      <div class="modal-handle"></div>
      <h2>Encerrar Temporada</h2>
      <div class="field">
        <label>Nome da temporada</label>
        <input type="text" id="seasonName" placeholder="Ex: 2025 – 2026">
      </div>
      <div class="season-summary" id="seasonSummaryPreview"></div>
      <div class="modal-actions">
        <button class="btn-cancel" id="btnSeasonCancel">Cancelar</button>
        <button class="btn-end-confirm" id="btnSeasonConfirm">Encerrar e iniciar nova</button>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-handle"></div>
      <h2>Novo abastecimento</h2>
      <div class="field">
        <label>Data</label>
        <input type="date" id="modalDate">
      </div>
      <div class="field">
        <label>Valor colocado (€)</label>
        <input type="number" id="modalAmount" step="0.01" min="0.01" placeholder="0.00">
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="btnCancel">Cancelar</button>
        <button class="btn-save" id="btnSave">Guardar</button>
      </div>
    </div>
  </div>

  <script>
    const ENTRIES_KEY = 'gastoGasolina_entries';
    const CFG_KEY     = 'gastoGasolina_cfg';
    const SEASONS_KEY = 'gastoGasolina_seasons';

    function loadSeasons() {
      try { return JSON.parse(localStorage.getItem(SEASONS_KEY) || '[]'); }
      catch { return []; }
    }
    function saveSeasons(s) { localStorage.setItem(SEASONS_KEY, JSON.stringify(s)); }

    // Dados históricos da temporada 2025-2026 (apenas semanas com abastecimento)
    const TEMPORADA_2025_2026 = [
      { data: '2025-07-28', colocado: 75.00 },
      { data: '2025-08-04', colocado: 100.00 },
      { data: '2025-08-11', colocado: 80.00 },
      { data: '2025-08-18', colocado: 93.00 },
      { data: '2025-09-01', colocado: 75.00 },
      { data: '2025-09-15', colocado: 92.00 },
      { data: '2025-09-22', colocado: 55.00 },
      { data: '2025-09-29', colocado: 91.00 },
      { data: '2025-10-06', colocado: 68.00 },
      { data: '2025-10-13', colocado: 64.00 },
      { data: '2025-10-20', colocado: 60.00 },
      { data: '2025-10-27', colocado: 46.00 },
      { data: '2025-11-03', colocado: 101.00 },
      { data: '2025-11-10', colocado: 68.00 },
      { data: '2025-11-17', colocado: 68.00 },
      { data: '2025-12-01', colocado: 74.00 },
      { data: '2025-12-08', colocado: 50.00 },
      { data: '2025-12-15', colocado: 60.00 },
      { data: '2025-12-22', colocado: 65.00 },
      { data: '2025-12-29', colocado: 75.00 },
      { data: '2026-01-05', colocado: 70.00 },
      { data: '2026-01-12', colocado: 50.00 },
      { data: '2026-01-19', colocado: 80.00 },
      { data: '2026-01-26', colocado: 84.00 },
      { data: '2026-02-02', colocado: 69.00 },
      { data: '2026-02-09', colocado: 100.00 },
      { data: '2026-02-16', colocado: 77.00 },
      { data: '2026-02-23', colocado: 45.00 },
      { data: '2026-03-02', colocado: 46.00 },
      { data: '2026-03-09', colocado: 75.00 },
      { data: '2026-03-16', colocado: 62.00 },
      { data: '2026-03-23', colocado: 78.00 },
      { data: '2026-03-30', colocado: 75.00 },
      { data: '2026-04-06', colocado: 78.00 },
      { data: '2026-04-13', colocado: 160.42 },
      { data: '2026-04-20', colocado: 100.00 },
      { data: '2026-04-27', colocado: 78.00 },
      { data: '2026-05-04', colocado: 54.00 },
      { data: '2026-05-11', colocado: 100.00 },
      { data: '2026-05-18', colocado: 86.00 },
    ];

    // ── Storage ────────────────────────────────────────────────
    function loadEntries() {
      try { return JSON.parse(localStorage.getItem(ENTRIES_KEY) || '[]'); }
      catch { return []; }
    }
    function saveEntries(e) { localStorage.setItem(ENTRIES_KEY, JSON.stringify(e)); }

    function loadCfg() {
      try { return JSON.parse(localStorage.getItem(CFG_KEY) || '{}'); }
      catch { return {}; }
    }
    function saveCfg(c) { localStorage.setItem(CFG_KEY, JSON.stringify(c)); }

    // ── Week helpers ───────────────────────────────────────────
    function todayStr() { return new Date().toISOString().slice(0, 10); }

    // Monday of the ISO week containing dateStr (YYYY-MM-DD)
    function weekMonday(dateStr) {
      const d = new Date(dateStr + 'T12:00:00');
      const day = d.getDay(); // 0=Sun
      d.setDate(d.getDate() + (day === 0 ? -6 : 1 - day));
      d.setHours(0, 0, 0, 0);
      return d;
    }

    // Number of weeks from startDate's Monday up to targetDate's Monday (min 1)
    function weekCount(startDateStr, targetDateStr) {
      const ms = weekMonday(targetDateStr) - weekMonday(startDateStr);
      return Math.max(1, Math.floor(ms / (7 * 24 * 60 * 60 * 1000)) + 1);
    }

    // "Semana 03/06 – 08/06/26" label
    function weekLabel(dateStr) {
      const mon = weekMonday(dateStr);
      const sun = new Date(mon); sun.setDate(sun.getDate() + 6);
      const p = (n) => String(n).padStart(2, '0');
      return p(mon.getDate()) + '/' + p(mon.getMonth()+1) + ' – ' +
             p(sun.getDate()) + '/' + p(sun.getMonth()+1) + '/' +
             String(sun.getFullYear()).slice(2);
    }

    function fmtDate(dateStr) {
      const [y, m, d] = dateStr.split('-');
      return d + '/' + m + '/' + y;
    }

    function fmtEur(val) {
      const abs = Math.abs(val);
      return (val < 0 ? '−' : '') + '€' + abs.toFixed(2);
    }

    // ── Reference start date ───────────────────────────────────
    function getStartDate() {
      const cfg = loadCfg();
      if (cfg.startDate) return cfg.startDate;
      const entries = loadEntries().sort((a, b) => a.data.localeCompare(b.data));
      return entries.length > 0 ? entries[0].data : todayStr();
    }

    function getBudget() {
      const cfg = loadCfg();
      return Number(cfg.budget) || 75;
    }

    // ── Render ─────────────────────────────────────────────────
    function render() {
      const entries = loadEntries().sort((a, b) => a.data.localeCompare(b.data));
      const budget = getBudget();
      const start  = getStartDate();
      const cfg    = loadCfg();

      // Current available balance
      const weeksNow   = weekCount(start, todayStr());
      const totalBudget = weeksNow * budget;
      const totalPlaced = entries.reduce((s, e) => s + Number(e.colocado), 0);
      const available   = totalBudget - totalPlaced;

      const balEl    = document.getElementById('balanceAmount');
      const statsEl  = document.getElementById('balanceStats');
      const weekInfo = document.getElementById('balanceWeekInfo');

      if (entries.length === 0 && !cfg.startDate) {
        balEl.textContent = '—';
        balEl.className   = 'balance-amount empty';
        statsEl.textContent = 'Adicione o primeiro abastecimento';
        weekInfo.innerHTML  = '';
      } else {
        balEl.textContent = fmtEur(available);
        balEl.className   = 'balance-amount ' + (available >= 0 ? 'pos' : 'neg');
        statsEl.innerHTML =
          '<strong>' + weeksNow + '</strong> sem. × €' + budget.toFixed(2) +
          ' = <strong>€' + totalBudget.toFixed(2) + '</strong> acumulado' +
          '&nbsp;&nbsp;|&nbsp;&nbsp;' +
          '<strong>€' + totalPlaced.toFixed(2) + '</strong> colocado';
        weekInfo.innerHTML =
          '<span class="balance-week-info">Início: ' + fmtDate(start) +
          ' &nbsp;·&nbsp; Semana atual: ' + weekLabel(todayStr()) + '</span>';
      }

      // Entry count
      document.getElementById('entryCount').textContent =
        entries.length > 0 ? entries.length + ' registo' + (entries.length !== 1 ? 's' : '') : '';

      // Table
      const tableContent = document.getElementById('tableContent');
      if (entries.length === 0) {
        tableContent.innerHTML =
          '<div class="empty-state"><div class="empty-icon">⛽</div>Nenhum abastecimento registado ainda</div>';
        renderSeasons();
        return;
      }

      let html = '<table><thead><tr>' +
        '<th>Data</th><th>Semana</th><th>Colocado</th><th>Saldo</th><th></th>' +
        '</tr></thead><tbody>';

      // Calcula saldos acumulados (ordem cronológica)
      let runningPlaced = 0;
      const rows = entries.map((e, i) => {
        const wc         = weekCount(start, e.data);
        const budgetHere = wc * budget;
        runningPlaced   += Number(e.colocado);
        const saldo      = budgetHere - runningPlaced;
        return { e, i, saldo };
      });

      // Exibe da mais recente para a mais antiga
      rows.slice().reverse().forEach(({ e, i, saldo }) => {
        const cls = saldo >= 0 ? 'pos' : 'neg';
        html += '<tr>' +
          '<td><strong>' + fmtDate(e.data) + '</strong></td>' +
          '<td class="week-cell">' + weekLabel(e.data) + '</td>' +
          '<td class="amount-cell">€' + Number(e.colocado).toFixed(2) + '</td>' +
          '<td class="saldo-cell ' + cls + '">' + fmtEur(saldo) + '</td>' +
          '<td class="action-cell">' +
            '<button class="btn-delete" data-idx="' + i + '" title="Apagar">✕</button>' +
          '</td>' +
          '</tr>';
      });

      html += '</tbody></table>';
      tableContent.innerHTML = html;

      // Delete buttons
      tableContent.querySelectorAll('.btn-delete').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = Number(btn.dataset.idx);
          const all = loadEntries().sort((a, b) => a.data.localeCompare(b.data));
          all.splice(idx, 1);
          saveEntries(all);
          render();
        });
      });

      renderSeasons();
    }

    // ── Past seasons ──────────────────────────────────────────
    function renderSeasons() {
      const seasons = loadSeasons();
      const section = document.getElementById('seasonsSection');
      const toggle  = document.getElementById('seasonsToggle');

      if (seasons.length === 0) {
        toggle.style.display = 'none';
        section.innerHTML = '';
        return;
      }
      toggle.style.display = 'block';

      const html = seasons.slice().reverse().map(s => {
        const saldoCls = s.saldo >= 0 ? 'pos' : 'neg';
        return `<div class="season-card">
          <div class="season-card-header">
            <span class="season-name">${s.nome}</span>
            <span class="season-period">${s.inicio} → ${s.fim}</span>
          </div>
          <div class="season-stats">
            <div class="season-stat">
              <div class="season-stat-label">Semanas</div>
              <div class="season-stat-value">${s.semanas}</div>
            </div>
            <div class="season-stat">
              <div class="season-stat-label">Orçamento</div>
              <div class="season-stat-value">€${s.orcamento.toFixed(2)}</div>
            </div>
            <div class="season-stat">
              <div class="season-stat-label">Total colocado</div>
              <div class="season-stat-value">€${s.colocado.toFixed(2)}</div>
            </div>
            <div class="season-stat">
              <div class="season-stat-label">Saldo final</div>
              <div class="season-stat-value ${saldoCls}">${fmtEur(s.saldo)}</div>
            </div>
          </div>
        </div>`;
      }).join('');
      section.innerHTML = html;
    }

    // ── Season end modal ───────────────────────────────────────
    const seasonOverlay = document.getElementById('seasonOverlay');

    document.getElementById('btnSeasonEnd').addEventListener('click', () => {
      const entries = loadEntries().sort((a, b) => a.data.localeCompare(b.data));
      const cfg     = loadCfg();
      const budget  = getBudget();
      const start   = getStartDate();

      if (entries.length === 0) {
        alert('Não há abastecimentos registados nesta temporada.');
        return;
      }

      const lastDate    = entries[entries.length - 1].data;
      const weeks       = weekCount(start, todayStr());
      const orcamento   = weeks * budget;
      const colocado    = entries.reduce((s, e) => s + Number(e.colocado), 0);
      const saldo       = orcamento - colocado;
      const saldoCls    = saldo >= 0 ? 'pos' : 'neg';

      // Pre-fill season name from start/end years
      const startYear = start.slice(0, 4);
      const endYear   = todayStr().slice(0, 4);
      document.getElementById('seasonName').value =
        startYear === endYear ? startYear : startYear + ' – ' + endYear;

      document.getElementById('seasonSummaryPreview').innerHTML = `
        <div class="season-summary-row">
          <span>Período</span>
          <span>${fmtDate(start)} → ${fmtDate(todayStr())}</span>
        </div>
        <div class="season-summary-row">
          <span>Semanas</span>
          <span>${weeks}</span>
        </div>
        <div class="season-summary-row">
          <span>Orçamento acumulado</span>
          <span>€${orcamento.toFixed(2)}</span>
        </div>
        <div class="season-summary-row">
          <span>Total colocado</span>
          <span>€${colocado.toFixed(2)}</span>
        </div>
        <div class="season-summary-row">
          <span>Saldo final</span>
          <span class="${saldoCls}">${fmtEur(saldo)}</span>
        </div>
        <div class="season-summary-row">
          <span>Abastecimentos</span>
          <span>${entries.length}</span>
        </div>`;

      seasonOverlay.classList.add('open');
    });

    function closeSeasonModal() { seasonOverlay.classList.remove('open'); }

    document.getElementById('btnSeasonCancel').addEventListener('click', closeSeasonModal);
    seasonOverlay.addEventListener('click', e => { if (e.target === seasonOverlay) closeSeasonModal(); });

    document.getElementById('btnSeasonConfirm').addEventListener('click', () => {
      const nome    = document.getElementById('seasonName').value.trim() || 'Temporada';
      const entries = loadEntries().sort((a, b) => a.data.localeCompare(b.data));
      const budget  = getBudget();
      const start   = getStartDate();
      const weeks   = weekCount(start, todayStr());

      const summary = {
        nome,
        inicio:    fmtDate(start),
        fim:       fmtDate(todayStr()),
        semanas:   weeks,
        orcamento: weeks * budget,
        colocado:  entries.reduce((s, e) => s + Number(e.colocado), 0),
        saldo:     weeks * budget - entries.reduce((s, e) => s + Number(e.colocado), 0),
        registos:  entries.length,
      };

      const seasons = loadSeasons();
      seasons.push(summary);
      saveSeasons(seasons);

      // Reset current season
      saveEntries([]);
      saveCfg({ budget });
      loadSettingsUI();
      closeSeasonModal();
      render();
    });

    // ── Modal ──────────────────────────────────────────────────
    const overlay = document.getElementById('modalOverlay');

    document.getElementById('btnAdd').addEventListener('click', () => {
      document.getElementById('modalDate').value   = todayStr();
      document.getElementById('modalAmount').value = '';
      overlay.classList.add('open');
      setTimeout(() => document.getElementById('modalAmount').focus(), 250);
    });

    function closeModal() { overlay.classList.remove('open'); }

    document.getElementById('btnCancel').addEventListener('click', closeModal);
    overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });

    document.getElementById('btnSave').addEventListener('click', () => {
      const date   = document.getElementById('modalDate').value;
      const amount = parseFloat(document.getElementById('modalAmount').value);
      if (!date)                  { alert('Por favor escolha a data.'); return; }
      if (isNaN(amount) || amount <= 0) { alert('Por favor insira um valor válido.'); return; }

      const entries = loadEntries();
      entries.push({ data: date, colocado: Number(amount.toFixed(2)) });
      saveEntries(entries);
      closeModal();
      render();
    });

    // Allow Enter on amount field to submit
    document.getElementById('modalAmount').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('btnSave').click();
    });

    // ── Seasons toggle ─────────────────────────────────────────
    document.getElementById('seasonsToggle').addEventListener('click', () => {
      document.getElementById('seasonsSection').classList.toggle('open');
    });

    // ── Settings ───────────────────────────────────────────────
    const settingsCard = document.getElementById('settingsCard');
    document.getElementById('settingsToggle').addEventListener('click', () => {
      settingsCard.classList.toggle('open');
    });

    function loadSettingsUI() {
      const cfg = loadCfg();
      document.getElementById('cfgBudget').value    = cfg.budget    || 75;
      document.getElementById('cfgStartDate').value = cfg.startDate || '';
      document.getElementById('cfgAsUrl').value     = cfg.asUrl     || '';
      document.getElementById('cfgApiToken').value  = cfg.apiToken  || '';
    }

    document.getElementById('btnSaveSettings').addEventListener('click', () => {
      const budget    = parseFloat(document.getElementById('cfgBudget').value) || 75;
      const startDate = document.getElementById('cfgStartDate').value;
      const asUrl     = document.getElementById('cfgAsUrl').value.trim();
      const apiToken  = document.getElementById('cfgApiToken').value.trim();
      saveCfg({ budget, startDate, asUrl, apiToken });
      render();
      settingsCard.classList.remove('open');
    });

    document.getElementById('btnExport').addEventListener('click', () => {
      const payload = { entries: loadEntries(), cfg: loadCfg() };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'gasolina_' + todayStr() + '.json';
      a.click();
    });

    document.getElementById('btnImport').addEventListener('click', () => {
      const input = document.createElement('input');
      input.type = 'file'; input.accept = '.json';
      input.onchange = ev => {
        const file = ev.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e2 => {
          try {
            const payload = JSON.parse(e2.target.result);
            // Support both {entries, cfg} and plain array
            const entries = Array.isArray(payload) ? payload : (payload.entries || []);
            const cfg     = Array.isArray(payload) ? {}       : (payload.cfg     || {});
            if (!Array.isArray(entries)) throw new Error('formato inválido');
            saveEntries(entries);
            saveCfg(cfg);
            loadSettingsUI();
            render();
            alert('Importado com sucesso! ' + entries.length + ' registos.');
          } catch { alert('Erro ao importar — ficheiro inválido.'); }
        };
        reader.readAsText(file);
      };
      input.click();
    });

    document.getElementById('btnClearAll').addEventListener('click', () => {
      if (!confirm('Apagar todos os dados? Esta ação não pode ser desfeita.')) return;
      saveEntries([]);
      saveCfg({});
      loadSettingsUI();
      render();
    });

    // ── Init ───────────────────────────────────────────────────
    // Pré-carrega dados históricos se o localStorage estiver vazio
    if (loadEntries().length === 0 && !loadCfg().startDate) {
      saveEntries(TEMPORADA_2025_2026);
      saveCfg({ budget: 75, startDate: '2025-07-28' });
    }

    loadSettingsUI();
    render();
  </script>
</body>
</html>
